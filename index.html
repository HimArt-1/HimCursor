<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <title>HimControl - Wushai</title>
  <base href="/">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1C1612">
  <meta name="description" content="لوحة تحكم وإدارة المشاريع والمهام - HimControl">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Washa Control">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Washa Control">
  <meta name="msapplication-TileColor" content="#1C1612">
  <meta name="msapplication-navbutton-color" content="#1C1612">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="src/assets/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="src/favicon.png">
  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.4.0/dist/bwip-js-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body
  class="bg-wushai-light text-wushai-forest dark:bg-wushai-espresso dark:text-wushai-sand transition-colors duration-500 h-screen overflow-hidden">
  <app-root>
    <style>
      body { margin: 0; background-color: #1C1612; }
      .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #1C1612;
        color: #E2DFD2;
        font-family: 'Alexandria', sans-serif;
      }
      .splash-logo {
        font-size: 3rem;
        font-weight: 700;
        letter-spacing: -0.05em;
        background: linear-gradient(to right, #E2DFD2, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        margin-bottom: 1rem;
      }
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(226, 223, 210, 0.1);
        border-radius: 50%;
        border-top-color: #6B705C;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .7; transform: scale(0.98); } }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <div class="splash-container">
      <div class="splash-logo">Washa Control</div>
      <div class="splash-spinner"></div>
    </div>
  </app-root>
</body>

</html>
